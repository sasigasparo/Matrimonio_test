services:
  - type: web
    name: wedding-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: FRONTEND_URL
        value: https://sasigasparo.github.io/Matrimonio_test
