name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Wedding_App/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: Wedding_App

      - name: Build project
        run: npx vite build --base /Matrimonio_test/
        working-directory: Wedding_App
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Wedding_App/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4