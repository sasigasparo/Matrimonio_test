<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <meta name="theme-color" content="#FFFFF0" />

    <!-- Fonts: Playfair Display (display) + Inter (UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet" />

    <title>Antonios & Petronia — Our Wedding</title>
    <meta name="description" content="Everything about Antonios & Petronia's wedding: schedule, venue, RSVP and photo gallery. Join us on 17 October 2026!" />

    <!-- Open Graph (WhatsApp, Facebook, Telegram, ecc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Antonios & Petronia — Our Wedding" />
    <meta property="og:description" content="Join us on 17 October 2026 🌸 Schedule, venue, RSVP and photo gallery." />
    <meta property="og:image" content="https://matrimonio-test.pages.dev/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://matrimonio-test.pages.dev/" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Antonios & Petronia — Our Wedding" />
    <meta name="twitter:description" content="Join us on 17 October 2026 🌸" />
    <meta name="twitter:image" content="https://matrimonio-test.pages.dev/og-image.jpg" />

    <script>
      // Cloudflare Pages SPA fix: ripristina il path salvato da 404.html
      (function () {
        var redirect = sessionStorage.getItem('redirect')
        if (redirect) {
          sessionStorage.removeItem('redirect')
          var url = new URL(redirect, location.origin)
          if (url.pathname !== location.pathname) {
            history.replaceState(null, '', redirect)
          }
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
